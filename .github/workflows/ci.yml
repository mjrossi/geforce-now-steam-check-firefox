name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      MISE_ENV: ci
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx vitest run
      - run: node build.mjs
      - run: npx web-ext lint --source-dir dist
